<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshDeals 11435 - Grocery Savings</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --accent: #f43f5e;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding-bottom: 50px;
        }

        header {
            background: linear-gradient(135deg, #10b981, #3b82f6);
            color: white;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .filter-section {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .filter-group { display: flex; flex-direction: column; gap: 10px; }
        .filter-label { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); }

        .filters { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 99px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .deals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .deal-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            border: 1px solid #f1f5f9;
        }

        .deal-card:hover { transform: translateY(-4px); }

        .card-img {
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f1f5f9;
        }

        .item-emoji { font-size: 4rem; z-index: 1; }

        .price-tag {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(244, 63, 94, 0.3);
        }

        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .cat-badge { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--primary); margin-bottom: 8px; }
        .item-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 12px; line-height: 1.3; }
        .store-info { margin-top: auto; font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }

        .no-results { grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text-muted); }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <h1>🍎 FreshDeals 11435</h1>
            <p>Today's Best Grocery Savings in Jamaica, NY</p>
        </div>
    </header>

    <div class="container">
        <div class="filter-section">
            <div class="filter-group">
                <span class="filter-label">Categories</span>
                <div class="filters" id="catFilters">
                    <button class="filter-btn active" onclick="setCat('all')">✨ All</button>
                    <button class="filter-btn" onclick="setCat('Bakery')">🍞 Bakery</button>
                    <button class="filter-btn" onclick="setCat('Snacks')">🍿 Snacks</button>
                    <button class="filter-btn" onclick="setCat('Ice Cream')">🍦 Ice Cream</button>
                    <button class="filter-btn" onclick="setCat('Meat')">🥩 Meat</button>
                    <button class="filter-btn" onclick="setCat('Dairy')">🥛 Dairy</button>
                    <button class="filter-btn" onclick="setCat('Produce')">🥦 Produce</button>
                </div>
            </div>
            <div class="filter-group">
                <span class="filter-label">Stores</span>
                <div class="filters" id="storeFilters">
                    <button class="filter-btn active" onclick="setStore('all')">All Stores</button>
                    <button class="filter-btn" onclick="setStore('Foodtown')">Foodtown</button>
                    <button class="filter-btn" onclick="setStore('Ideal Food Basket')">Ideal</button>
                    <button class="filter-btn" onclick="setStore('Key Food')">Key Food</button>
                    <button class="filter-btn" onclick="setStore('C-Town')">C-Town</button>
                    <button class="filter-btn" onclick="setStore('Food Bazaar')">Food Bazaar</button>
                </div>
            </div>
        </div>

        <div id="dealsGrid" class="deals-grid"></div>
    </div>

    <script>
        // Unique imagery mapping
        const visualMap = {
            'Baguettes': { emoji: '🥖', img: 'https://images.unsplash.com/photo-1598144819059-42cd69b25693?auto=format&fit=crop&w=400&q=80' },
            'Bites': { emoji: '🧁', img: 'https://images.unsplash.com/photo-1558961363-fa8fdf82db35?auto=format&fit=crop&w=400&q=80' },
            'Cookies': { emoji: '🍪', img: 'https://images.unsplash.com/photo-1499636136210-6f4ee915583e?auto=format&fit=crop&w=400&q=80' },
            'Bread': { emoji: '🍞', img: 'https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=400&q=80' },
            'Pie': { emoji: '🥧', img: 'https://images.unsplash.com/photo-1572383661896-f99fb085057a?auto=format&fit=crop&w=400&q=80' },
            'Donuts': { emoji: '🍩', img: 'https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=400&q=80' },
            'Chips': { emoji: '🥔', img: 'https://images.unsplash.com/photo-1566478989037-eec170784d0b?auto=format&fit=crop&w=400&q=80' },
            'Soda': { emoji: '🥤', img: 'https://images.unsplash.com/photo-1622483767028-3f66f32aef97?auto=format&fit=crop&w=400&q=80' },
            'Pringles': { emoji: '🥫', img: 'https://images.unsplash.com/photo-1518085033483-e7119953930d?auto=format&fit=crop&w=400&q=80' },
            'Ice Cream': { emoji: '🍨', img: 'https://images.unsplash.com/photo-1501443762994-82bd5dace89a?auto=format&fit=crop&w=400&q=80' },
            'Steak': { emoji: '🥩', img: 'https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=400&q=80' },
            'Chicken': { emoji: '🍗', img: 'https://images.unsplash.com/photo-1604503468506-a8da13d82791?auto=format&fit=crop&w=400&q=80' },
            'Salmon': { emoji: '🐟', img: 'https://images.unsplash.com/photo-1485921325833-c519f76c4927?auto=format&fit=crop&w=400&q=80' },
            'Shrimp': { emoji: '🦐', img: 'https://images.unsplash.com/photo-1559742811-822873691df8?auto=format&fit=crop&w=400&q=80' },
            'Milk': { emoji: '🥛', img: 'https://images.unsplash.com/photo-1563636619-e9107da93abd?auto=format&fit=crop&w=400&q=80' },
            'Eggs': { emoji: '🥚', img: 'https://images.unsplash.com/photo-1506976785307-8732e854ad03?auto=format&fit=crop&w=400&q=80' },
            'Cheese': { emoji: '🧀', img: 'https://images.unsplash.com/photo-1485962391945-44760221d035?auto=format&fit=crop&w=400&q=80' },
            'Mangoes': { emoji: '🥭', img: 'https://images.unsplash.com/photo-1553279768-865429fa0078?auto=format&fit=crop&w=400&q=80' },
            'Bananas': { emoji: '🍌', img: 'https://images.unsplash.com/photo-1571771894821-ad990241094d?auto=format&fit=crop&w=400&q=80' },
            'Grapes': { emoji: '🍇', img: 'https://images.unsplash.com/photo-1537640538966-79f369b40189?auto=format&fit=crop&w=400&q=80' }
        };

        const deals = [
            { cat: 'Bakery', name: 'Fresh International Baguettes', price: '2/$3.00', store: 'Food Bazaar' },
            { cat: 'Bakery', name: "Entenmann's Little Bites", price: '$2.99', store: 'Key Food' },
            { cat: 'Bakery', name: 'Lofthouse Iced Cookies', price: '$3.49', store: 'Ideal Food Basket' },
            { cat: 'Bakery', name: 'Krasdale Sliced Bread', price: '$1.99', store: 'C-Town' },
            { cat: 'Bakery', name: 'Store Baked Apple Pie', price: '$4.99', store: 'Foodtown' },
            { cat: 'Bakery', name: 'Glazed Donuts (6pk)', price: '$3.99', store: 'Ideal Food Basket' },
            { cat: 'Snacks', name: "Lay's Family Size Chips", price: '2/$6.00', store: 'Food Bazaar' },
            { cat: 'Snacks', name: 'Sunkist Soda (2L)', price: '4/$5.00', store: 'Ideal Food Basket' },
            { cat: 'Snacks', name: 'Pringles Cans', price: '3/$5.00', store: 'C-Town' },
            { cat: 'Ice Cream', name: 'Haagen-Dazs Pints', price: '$3.99', store: 'Food Bazaar' },
            { cat: 'Meat', name: 'Beef NY Strip Steak', price: '$7.99/lb', store: 'Food Bazaar' },
            { cat: 'Meat', name: 'Whole Young Chicken', price: '$1.29/lb', store: 'C-Town' },
            { cat: 'Meat', name: 'Fresh Atlantic Salmon', price: '$9.99/lb', store: 'Foodtown' },
            { cat: 'Meat', name: 'Large White Shrimp', price: '$5.99/lb', store: 'Ideal Food Basket' },
            { cat: 'Dairy', name: 'Krasdale Milk (Gallon)', price: '$3.49', store: 'C-Town' },
            { cat: 'Dairy', name: 'Large Eggs (Dozen)', price: '$2.49', store: 'Foodtown' },
            { cat: 'Dairy', name: 'Sargento Shredded Cheese', price: '$2.99', store: 'Foodtown' },
            { cat: 'Produce', name: 'Tropical Mangoes', price: '5/$5.00', store: 'Food Bazaar' },
            { cat: 'Produce', name: 'Fresh Green Bananas', price: '$0.49/lb', store: 'Ideal Food Basket' },
            { cat: 'Produce', name: 'Red Seedless Grapes', price: '$1.99/lb', store: 'C-Town' }
        ];

        let curCat = 'all';
        let curStore = 'all';

        function getVisual(name) {
            for (let key in visualMap) {
                if (name.includes(key)) return visualMap[key];
            }
            return { emoji: '🛍️', img: '' };
        }

        function render() {
            const grid = document.getElementById('dealsGrid');
            grid.innerHTML = '';
            const filtered = deals.filter(d => (curCat === 'all' || d.cat === curCat) && (curStore === 'all' || d.store === curStore));
            
            if (!filtered.length) {
                grid.innerHTML = '<div class="no-results">No deals match these filters. Try something else!</div>';
                return;
            }

            filtered.forEach(d => {
                const vis = getVisual(d.name);
                const card = document.createElement('div');
                card.className = 'deal-card';
                card.innerHTML = `
                    <div class="card-img" style="background-image: url('${vis.img}')">
                        <span class="item-emoji">${vis.img ? '' : vis.emoji}</span>
                        <div class="price-tag">${d.price}</div>
                    </div>
                    <div class="card-body">
                        <div class="cat-badge">${d.cat}</div>
                        <div class="item-name">${d.name}</div>
                        <div class="store-info">📍 ${d.store}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function setCat(c) { 
            curCat = c; 
            document.querySelectorAll('#catFilters .filter-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(c) || (c === 'all' && b.innerText.includes('All'))));
            render(); 
        }
        function setStore(s) { 
            curStore = s; 
            document.querySelectorAll('#storeFilters .filter-btn').forEach(b => b.classList.toggle('active', b.getAttribute('onclick').includes(`'${s}'`)));
            render(); 
        }

        render();
    </script>
</body>
</html>
